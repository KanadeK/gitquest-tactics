name: Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "22 3 * * 1"
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          {
            node-version: 24,
            cache: npm,
            cache-dependency-path: package-lock.json,
          }
      - run: npm ci
      - run: npm audit --omit=dev
      - name: Detect likely secrets
        run: "! git grep -nEI '(ghp_|github_pat_|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH) PRIVATE KEY)'"
