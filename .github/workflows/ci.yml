name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          {
            node-version: 24,
            cache: npm,
            cache-dependency-path: package-lock.json,
          }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint && npm run format:check && npm run typecheck && npm run test:coverage && npm run test:e2e && npm run build
      - run: npm run package
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          {
            name: verification-artifacts,
            path: "coverage,playwright-report,dist-release",
            if-no-files-found: ignore,
          }
